<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HiveMaster</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; position: relative; }
        .auth-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.1; }
        .auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: -1; }
    </style>
</head>
<body class="bg-alt">

    <div class="auth-container">
        <!-- Background elements -->
        <div class="auth-overlay"></div>
        <img src="https://placehold.co/1920x1080/f59e0b/1f2937?text=Honeycomb+Pattern" alt="Background" class="auth-bg">

        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 0.5rem; font-size: 2rem;">
                    <i data-lucide="hexagon" class="logo-icon" style="width: 32px; height: 32px;"></i>
                    <span>HiveMaster</span>
                </a>
                <p style="color: var(--text-muted);">Welcome back to the apiary!</p>
            </div>

            <form onsubmit="event.preventDefault()">
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                
                <div class="auth-form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i data-lucide="eye" style="width: 20px;"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-options">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="width: auto; margin: 0;">
                        <span style="color: var(--text-muted); font-weight: 500;">Remember me</span>
                    </label>
                    <a href="#" class="text-primary" style="font-weight: 500;">Forgot Password?</a>
                </div>

                <div class="auth-form-group">
                    <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
                </div>
            </form>

            <div class="social-login">
                <div class="social-login-title">Or continue with</div>
                <div class="social-btns">
                    <button class="btn-social">
                        <!-- Custom minimal SVG for Google to simulate icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                    <button class="btn-social">
                        <i data-lucide="apple" style="width: 20px;"></i>
                        Apple
                    </button>
                </div>
            </div>
            
            <p class="text-center" style="margin-top: 2rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" class="text-primary" style="font-weight: 600;">Sign up</a>
            </p>


        </div>
    </div>

    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
